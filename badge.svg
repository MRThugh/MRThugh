<svg width="250" height="64" viewBox="0 0 250 64" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- ================= DEFS (Gradients, Filters, Masks) ================= -->
  <defs>
    <!-- گرادیانت آبی لاجوردی و سرمه‌ای (Persian Night) -->
    <linearGradient id="bg-gradient" x1="0" y1="0" x2="250" y2="64">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="50%" stop-color="#1E1B4B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>

    <!-- گرادیانت طلایی اصیل ایرانی -->
    <linearGradient id="gold-gradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#BF953F" />
      <stop offset="25%" stop-color="#FCF6BA" />
      <stop offset="50%" stop-color="#B38728" />
      <stop offset="75%" stop-color="#FBF5B7" />
      <stop offset="100%" stop-color="#AA771C" />
    </linearGradient>

    <!-- گرادیانت فیروزه‌ای برای متن -->
    <linearGradient id="cyan-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00F5D4"/>
      <stop offset="100%" stop-color="#00BBF9"/>
    </linearGradient>

    <!-- گرادیانت طبیعی‌تر برای افکت درخشش روی کارت -->
    <linearGradient id="shine-gradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#FCF6BA" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <!-- افکت درخشش طلایی (Glow) -->
    <filter id="gold-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- ماسک گیت‌هاب (Octocat) -->
    <mask id="octocat-mask">
      <path d="M19 6C12.37 6 7 11.37 7 18C7 23.3 10.44 27.79 15.21 29.38C15.81 29.49 16.03 29.12 16.03 28.8C16.03 28.52 16.02 27.77 16.01 26.79C12.67 27.52 11.97 25.19 11.97 25.19C11.42 23.81 10.64 23.44 10.64 23.44C9.55 22.7 10.72 22.71 10.72 22.71C11.92 22.8 12.56 23.95 12.56 23.95C13.63 25.78 15.36 25.25 16.04 24.95C16.15 24.17 16.46 23.64 16.8 23.34C14.14 23.04 11.34 22.01 11.34 17.43C11.34 16.12 11.81 15.06 12.58 14.23C12.46 13.93 12.05 12.71 12.7 11.06C12.7 11.06 13.71 10.74 16.01 12.3C16.97 12.03 18 11.9 19.03 11.89C20.06 11.9 21.09 12.03 22.05 12.3C24.34 10.74 25.35 11.06 25.35 11.06C26 12.71 25.59 13.93 25.47 14.23C26.24 15.06 26.71 16.12 26.71 17.43C26.71 22.02 23.9 23.03 21.23 23.33C21.66 23.7 22.04 24.43 22.04 25.55C22.04 27.15 22.03 28.44 22.03 28.83C22.03 29.15 22.25 29.53 22.86 29.41C27.61 27.81 31.04 23.31 31.04 18C31.04 11.37 25.66 6 19 6Z" fill="white"/>
    </mask>

    <!-- کلیپ ماسک برای اطمینان از اینکه هیچ چیزی بیرون از قاب نمی‌زند -->
    <clipPath id="card-clip">
      <path d="M 12 2 L 238 2 L 248 12 L 248 52 L 238 62 L 12 62 L 2 52 L 2 12 Z"/>
    </clipPath>
  </defs>

  <!-- تمام محتویات را داخل این گروه قرار دادیم تا دقیقاً با خط طلایی کلیپ شود -->
  <g clip-path="url(#card-clip)">
    
    <!-- ================= BASE SHAPE ================= -->
    <path d="M 12 2 L 238 2 L 248 12 L 248 52 L 238 62 L 12 62 L 2 52 L 2 12 Z" fill="url(#bg-gradient)"/>
    
    <!-- ================= BACKGROUND ELEMENTS ================= -->
    <!-- شمسه (ستاره هشت‌پر) در پس زمینه سمت راست -->
    <g transform="translate(195, 32) scale(0.6)" opacity="0.15" stroke="#00F5D4" stroke-width="1.5" fill="none">
      <rect x="-20" y="-20" width="40" height="40" rx="3"/>
      <rect x="-20" y="-20" width="40" height="40" rx="3" transform="rotate(45)" />
      <circle cx="0" cy="0" r="15" stroke-dasharray="4 4" />
      <animateTransform attributeName="transform" type="rotate" from="0 195 32" to="360 195 32" dur="40s" repeatCount="indefinite" additive="sum"/>
    </g>

    <!-- ================= PERSIAN HALO BEHIND OCTOCAT ================= -->
    <!-- هاله تذهیب طلایی چرخان در پشت سر گربه -->
    <g transform="translate(36.8, 32.6)" opacity="0.7" stroke="url(#gold-gradient)" stroke-width="1" fill="none" filter="url(#gold-glow)">
      <g>
        <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="15s" repeatCount="indefinite"/>
        <rect x="-18" y="-18" width="36" height="36" rx="4"/>
        <rect x="-18" y="-18" width="36" height="36" rx="4" transform="rotate(45)"/>
        <circle cx="0" cy="0" r="23" stroke-width="0.5" stroke-dasharray="2 3"/>
      </g>
    </g>

    <!-- ================= OCTOCAT & FLAG ================= -->
    <g transform="translate(14, 11) scale(1.2)" mask="url(#octocat-mask)">
      <!-- رنگ سبز -->
      <rect x="7" y="6" width="25" height="24" fill="#239F40"/>
      <!-- موج سفید -->
      <path fill="#FFFFFF" d="M7 16 Q 13 14, 19 16 T 31 16 V 30 H 7 Z">
        <animate attributeName="d" dur="3s" repeatCount="indefinite"
          values="M7 16 Q 13 14, 19 16 T 31 16 V 30 H 7 Z; M7 16 Q 13 18, 19 16 T 31 16 V 30 H 7 Z; M7 16 Q 13 14, 19 16 T 31 16 V 30 H 7 Z"/>
      </path>
      <!-- موج قرمز -->
      <path fill="#DA0000" d="M7 22 Q 13 20, 19 22 T 31 22 V 30 H 7 Z">
        <animate attributeName="d" dur="3s" repeatCount="indefinite"
          values="M7 22 Q 13 20, 19 22 T 31 22 V 30 H 7 Z; M7 22 Q 13 24, 19 22 T 31 22 V 30 H 7 Z; M7 22 Q 13 20, 19 22 T 31 22 V 30 H 7 Z"/>
      </path>
    </g>

    <!-- ================= SEPARATOR (خاتم‌کاری) ================= -->
    <g transform="translate(68, 12)" fill="url(#gold-gradient)" filter="url(#gold-glow)">
      <polygon points="2,0 4,4 2,8 0,4" />
      <polygon points="2,12 4,16 2,20 0,16" />
      <polygon points="2,24 4,28 2,32 0,28" />
      <polygon points="2,36 4,40 2,44 0,40" />
      <line x1="2" y1="8" x2="2" y2="12" stroke="url(#gold-gradient)" stroke-width="0.5"/>
      <line x1="2" y1="20" x2="2" y2="24" stroke="url(#gold-gradient)" stroke-width="0.5"/>
      <line x1="2" y1="32" x2="2" y2="36" stroke="url(#gold-gradient)" stroke-width="0.5"/>
    </g>

    <!-- ================= TYPOGRAPHY ================= -->
    <text x="83" y="34" fill="url(#cyan-gradient)" font-family="system-ui, -apple-system, sans-serif"
          font-size="16" font-weight="800" letter-spacing="1.5" style="text-shadow: 0px 0px 8px rgba(0, 245, 212, 0.4);">
      Ali Kamrani
    </text>
    <text x="85" y="47" fill="#FBF5B7" font-family="system-ui, -apple-system, sans-serif"
          font-size="8" font-weight="500" letter-spacing="2.5" opacity="0.9">
      PERSIAN DEVELOPER
    </text>

    <!-- ================= SHINE EFFECT (درخشش طبیعی) ================= -->
    <!-- این مستطیل با گرادیانت نرم، حس رفلکس شیشه یا فلز صیقلی را می‌دهد -->
    <rect x="-150" y="-10" width="80" height="84" fill="url(#shine-gradient)" transform="skewX(-25)">
      <animate attributeName="x" from="-150" to="350" dur="4s" repeatCount="indefinite" />
    </rect>

    <!-- خطوط تزئینی طلایی داخلی (Inner Border) -->
    <path d="M 14 6 L 236 6 L 244 14 L 244 50 L 236 58 L 14 58 L 6 50 L 6 14 Z" fill="none" stroke="url(#gold-gradient)" stroke-width="0.5" opacity="0.6"/>

  </g>

  <!-- ================= BORDER (خط طلایی دور کادر) ================= -->
  <!-- خط بیرون گروه کلیپ شده قرار می‌گیرد تا کاملا شارپ بماند -->
  <path d="M 12 2 L 238 2 L 248 12 L 248 52 L 238 62 L 12 62 L 2 52 L 2 12 Z" fill="none" stroke="url(#gold-gradient)" stroke-width="2"/>

</svg>
